<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background:#f2f2f7; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .card { background:white; border-radius:20px; box-shadow:0 4px 20px rgba(0,0,0,0.05); width:100%; max-width:400px; padding:40px 32px; }
        h1 { font-size:1.5rem; font-weight:600; color:#1c1c1e; text-align:center; margin-bottom:24px; }
        .form-group { margin-bottom:16px; }
        input { width:100%; padding:14px 16px; border:1px solid #e5e5ea; border-radius:10px; font-size:1rem; outline:none; transition:border-color 0.2s; background:#ffffff; }
        input:focus { border-color:#0a5b8c; box-shadow:0 0 0 3px rgba(10,91,140,0.1); }
        button { width:100%; padding:14px; background:#0a5b8c; color:white; border:none; border-radius:10px; font-size:1rem; font-weight:500; cursor:pointer; transition:background 0.15s; margin-top:8px; }
        button:hover { background:#074a70; }
        #error-message { color:#b71c1c; text-align:center; margin-top:16px; font-size:0.9rem; }
        #success-message { color:#1e7b4c; text-align:center; margin-top:16px; font-size:0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Set New Password</h1>
        <form id="reset-form">
            <div class="form-group">
                <input type="password" id="password" placeholder="New password" required>
            </div>
            <div class="form-group">
                <input type="password" id="confirm-password" placeholder="Confirm password" required>
            </div>
            <button type="submit">Update Password</button>
        </form>
        <p id="error-message"></p>
        <p id="success-message"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase.js"></script>
    <script>
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            const errorEl = document.getElementById('error-message');
            const successEl = document.getElementById('success-message');

            if (password !== confirm) {
                errorEl.textContent = 'Passwords do not match';
                return;
            }

            const { error } = await supabaseClient.auth.updateUser({ password });
            if (error) {
                errorEl.textContent = error.message;
            } else {
                successEl.textContent = 'Password updated successfully. Redirecting to login...';
                setTimeout(() => { window.location.href = '/'; }, 3000);
            }
        });

        // Optional: check if we have a valid session (the user should be logged in via the reset link)
        supabaseClient.auth.getSession().then(({ data }) => {
            if (!data.session) {
                document.getElementById('error-message').textContent = 'No active session. Please request a new password reset link.';
            }
        });
    </script>
</body>
</html>
